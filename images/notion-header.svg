<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="notionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="10" y="10" width="380" height="180" rx="16" fill="#111113"/>
  
  <!-- Notion "N" stylized -->
  <g transform="translate(40, 40)">
    <!-- Document outline -->
    <rect x="0" y="0" width="80" height="100" rx="8" fill="none" stroke="url(#notionGrad)" stroke-width="3"/>
    <!-- Lines representing text -->
    <line x1="12" y1="20" x2="68" y2="20" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="35" x2="55" y2="35" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="12" y1="50" x2="62" y2="50" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="65" x2="48" y2="65" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="80" x2="58" y2="80" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Plus sign / automation symbol -->
  <g transform="translate(100, 90)">
    <circle cx="0" cy="0" r="20" fill="#111113" stroke="url(#notionGrad)" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="75" fill="#fafafa" font-family="system-ui, sans-serif" font-size="32" font-weight="600">Notion</text>
  <text x="150" y="115" fill="#a1a1aa" font-family="system-ui, sans-serif" font-size="24">Automation</text>
  
  <!-- Small decorative elements -->
  <circle cx="350" cy="50" r="4" fill="#a855f7" opacity="0.6"/>
  <circle cx="365" cy="70" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="340" cy="80" r="2" fill="#a855f7" opacity="0.4"/>
</svg>
